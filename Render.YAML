services:
  - type: web
    name: vaeco-sport
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_PATH
        value: /data/database.db
      name: db
      mountPath: /data
      sizeGB: 1

{% extends "base.html" %}

{% block content %}

<h2>Lịch sử đặt sân</h2>

<table>
<tr>
<th>Tên</th>
<th>Sân</th>
<th>Ngày</th>
<th>Giờ</th>
<th>Trạng thái</th>
</tr>

{% for b in data %}
<tr>
<td>{{b.name}}</td>
<td>{{b.field}}</td>
<td>{{b.date}}</td>
<td>{{b.start_time}} - {{b.end_time}}</td>
<td>{{b.status}}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
